name: Build CellCountX

on:
  push:
    tags:
      - 'v*'   # v1.0.0 や v0.9.0-beta などのタグでビルド

permissions:
  contents: write   # Release 作成に必須

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git describe のために必須

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ---------------------------------------------
      # Git タグからバージョン文字列を取得
      # ---------------------------------------------
      - name: Get version from tag
        id: get_version
        run: |
          $tag = git describe --tags --abbrev=0
          echo "version=$tag" >> $env:GITHUB_OUTPUT

      # ---------------------------------------------
      # python-runtime（分割 zip）を Pre-release から取得
      # ---------------------------------------------
      - name: Download python-runtime part1
        run: |
          curl -L -o python.zip.001 `
            https://github.com/bpse-simulation/CellCountX/releases/download/python-runtime/python.zip.001

      - name: Download python-runtime part2
        run: |
          curl -L -o python.zip.002 `
            https://github.com/bpse-simulation/CellCountX/releases/download/python-runtime/python.zip.002

      # ---------------------------------------------
      # 分割 zip を結合（cmd.exe）
      # ---------------------------------------------
      - name: Combine python-runtime zip
        shell: cmd
        run: |
          copy /b python.zip.001 + python.zip.002 python.zip

      # ---------------------------------------------
      # python.zip を展開（7z）
      # ---------------------------------------------
      - name: Extract python-runtime
        run: 7z x python.zip -opython

      # ---------------------------------------------
      # csproj の InformationalVersion を書き換え
      # ---------------------------------------------
      - name: Replace InformationalVersion in csproj
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $path = "src/CellCountX.Wpf/CellCountX.Wpf.csproj"

          $xml = Get-Content $path

          # InformationalVersion が存在しない場合は追加
          if ($xml -notmatch "InformationalVersion") {
            $xml = $xml -replace "</PropertyGroup>", "  <InformationalVersion>$version</InformationalVersion>`n</PropertyGroup>"
          }
          else {
            $xml = $xml -replace "<InformationalVersion>.*</InformationalVersion>", "<InformationalVersion>$version</InformationalVersion>"
          }

          $xml | Set-Content $path -Encoding UTF8

      # ---------------------------------------------
      # Publish（python/ は後で手動コピー）
      # ---------------------------------------------
      - name: Publish
        run: dotnet publish src/CellCountX.Wpf/CellCountX.Wpf.csproj -c Release -o publish

      # ---------------------------------------------
      # python runtime を publish に含める
      # ---------------------------------------------
      - name: Copy python runtime into publish folder
        run: |
          Copy-Item -Path python -Destination publish/python -Recurse

      # ---------------------------------------------
      # Release ノート自動生成
      # ---------------------------------------------
      - name: Generate release notes
        id: notes
        run: |
          $current = "${{ steps.get_version.outputs.version }}"
          $prev = git describe --tags --abbrev=0 $current^
          $log = git log $prev..$current --pretty=format:"- %s (%h)"
          $body = "## Changes in $current`n`n$log`n`n_Automatically generated from commit history._"
          $body | Out-File release_notes.txt -Encoding utf8
          echo "body<<EOF" >> $env:GITHUB_OUTPUT
          Get-Content release_notes.txt >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      # ---------------------------------------------
      # 出力を分割 zip 化（1ファイル最大 1900MB）
      # ---------------------------------------------
      - name: Create split zip (max 1900MB per file)
        run: |
          7z a -tzip -v1900m CellCountX-${{ steps.get_version.outputs.version }}.zip publish\*

      # ---------------------------------------------
      # Release にアップロード（分割ファイルすべて）
      # ---------------------------------------------
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: CellCountX-${{ steps.get_version.outputs.version }}.zip*
          body: ${{ steps.notes.outputs.body }}
