name: Build CellCountX

on:
  push:
    tags:
      - 'v*'   # v1.0.0 や v0.9.0-beta などのタグでビルド

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git describe のために必須

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version from tag
        id: get_version
        run: |
          $tag = git describe --tags --abbrev=0
          echo "version=$tag" >> $env:GITHUB_OUTPUT

      - name: Replace InformationalVersion in csproj
        run: |
          (Get-Content CellCountX.Wpf/CellCountX.Wpf.csproj) `
            -replace '<InformationalVersion>.*</InformationalVersion>',
                     "<InformationalVersion>${{ steps.get_version.outputs.version }}</InformationalVersion>" `
            | Set-Content CellCountX.Wpf/CellCountX.Wpf.csproj

      - name: Publish
        run: dotnet publish CellCountX.Wpf/CellCountX.Wpf.csproj -c Release -o publish

      - name: Zip output
        run: |
          Compress-Archive -Path publish/* -DestinationPath CellCountX-${{ steps.get_version.outputs.version }}.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: CellCountX-${{ steps.get_version.outputs.version }}.zip
